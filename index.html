<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Opening Messenger...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 20px 0;
        }
        .spinner {
            margin: 30px 0;
        }
        .spinner svg {
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        p {
            font-size: 14px;
            margin: 15px 0;
            opacity: 0.9;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #fff;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        a:active {
            transform: scale(0.98);
        }
        .error {
            display: none;
            background: rgba(255, 107, 107, 0.2);
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Opening Messenger...</h1>
        <div class="spinner">
            <svg viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></circle>
            </svg>
        </div>
        <p id="status">Connecting to your community...</p>
        <div class="error" id="error"></div>
        <a href="https://www.messenger.com/t/AbbM8wDd01JOgyWZ" id="fallbackLink">
            Open in Messenger
        </a>
    </div>

    <script>
        // Direct Messenger community link (most reliable)
        const messengerLink = "https://www.messenger.com/t/AbbM8wDd01JOgyWZ";
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const fallbackLink = document.getElementById('fallbackLink');
        
        let redirectAttempted = false;

        function attemptRedirect() {
            try {
                // Check if we're on a mobile device
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                
                if (isMobile) {
                    statusEl.textContent = 'Messenger is opening...';
                    
                    // Try app protocol first
                    const appScheme = "fb-messenger://t/AbbM8wDd01JOgyWZ";
                    window.location.href = appScheme;
                    redirectAttempted = true;
                    
                    // Fallback to web after 2 seconds
                    setTimeout(function() {
                        if (document.hidden === false) {
                            statusEl.textContent = 'Opening web version...';
                            window.location.href = messengerLink;
                        }
                    }, 2000);
                } else {
                    // Desktop: go directly to web link
                    statusEl.textContent = 'Opening Messenger community...';
                    window.location.href = messengerLink;
                    redirectAttempted = true;
                }
            } catch (e) {
                console.error('Redirect error:', e);
                showError();
            }
        }

        function showError() {
            errorEl.style.display = 'block';
            errorEl.textContent = 'If redirect doesn\'t work, tap the button below:';
            statusEl.textContent = 'Having trouble redirecting?';
            fallbackLink.style.display = 'inline-block';
        }

        // Start redirect
        window.addEventListener('load', function() {
            attemptRedirect();
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', attemptRedirect);
        } else {
            attemptRedirect();
        }

        // Fallback after 4 seconds
        setTimeout(function() {
            if (!redirectAttempted) {
                statusEl.textContent = 'Try clicking the button below:';
                fallbackLink.style.display = 'inline-block';
            }
        }, 4000);

        // Enable fallback link
        fallbackLink.onclick = function(e) {
            e.preventDefault();
            window.location.href = messengerLink;
            return false;
        };
    </script>
</body>
</html>
